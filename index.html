<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silva blog</title>
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #content {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <!-- Markdown 콘텐츠를 포함하거나 링크할 수 있습니다 -->
  <!-- <h1>Welcome to Silva's blog</h1> -->

  <div id="content">Loading...</div>

  <!-- marked.js 라이브러리 추가 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Markdown 파일을 불러오고 변환하여 표시하는 함수
    async function loadMarkdown() {
      try {
        const response = await fetch('README.md'); // 불러올 Markdown 파일 경로
        const text = await response.text();
        const content = document.getElementById('content');
        content.innerHTML = marked.parse(text);
      } catch (error) {
        console.error('Error loading markdown:', error);
        document.getElementById('content').innerText = 'Error loading content.';
      }
    }

    // 페이지 로드 시 Markdown 파일 불러오기
    window.onload = loadMarkdown;
  </script>
</body>
</html>
